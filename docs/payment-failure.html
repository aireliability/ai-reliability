<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Reliability — Payment Not Confirmed</title>
    <meta name="description" content="Payment confirmation status page." />
    <style>
      :root {
        --bg: #0b0d12;
        --card: #121725;
        --text: #e9edf7;
        --muted: #a9b4cf;
        --line: rgba(255, 255, 255, 0.12);
        --cta: #5b8cff;
        --ctaText: #0b0d12;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 56px 20px 72px;
      }
      h1 {
        font-size: 40px;
        line-height: 1.1;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
      }
      .sub {
        color: var(--muted);
        font-size: 18px;
        max-width: 72ch;
        margin-bottom: 22px;
      }
      .section {
        margin-top: 22px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
      }
      h2 {
        font-size: 18px;
        margin: 0 0 12px;
        color: #dbe4ff;
        letter-spacing: -0.01em;
      }
      ul {
        margin: 10px 0 0;
        padding-left: 20px;
        color: var(--text);
      }
      li {
        margin: 6px 0;
      }
      .row {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin: 18px 0 0;
      }
      .btn {
        display: inline-block;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--line);
        text-decoration: none;
        color: var(--text);
        font-weight: 600;
      }
      .btn.primary {
        background: var(--cta);
        color: var(--ctaText);
        border-color: transparent;
      }
      .foot {
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>AI Reliability — Payment Not Confirmed</h1>
      <p class="sub">Payment was not completed or could not be confirmed.</p>

      <section class="card section" aria-label="What to do next">
        <h2>What to do next</h2>
        <ul>
          <li>Try again later</li>
          <li>Review your billing details and try again</li>
          <li>If you need help, contact billing: billing@aireliabilityhq.com or support: support@aireliabilityhq.com</li>
        </ul>
        <div class="row">
          <a class="btn primary" href="index.html#pricing">Back to pricing</a>
        </div>
      </section>
    </main>
  </body>
</html>
